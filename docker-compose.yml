services:
  postgres:
    image: postgres:15
    container_name: modi-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  product-service:
    image: product-service:latest
    container_name: product-service
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8082:8082"

volumes:
  pg_data: