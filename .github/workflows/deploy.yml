name: Build, Push & Deploy (dev)

on:
  push:
    branches:
      - dev-cicd

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: prgrms-be-adv-devcourse
  TAG: latest

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      changed_services: ${{ steps.changes.outputs.changed_services }}
      changed_services_json: ${{ steps.changes.outputs.changed_services_json }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        run: |
          services=(
            "account-service"
            "product-service"
            "rental-service"
            "seller-service"
            "member-service"
            "review-service"
            "notification-service"
            "delivery-service"
            "modi-config"
            "modi-gateway"
            "modi-discovery"
          )

          before="${{ github.event.before }}"
          if [ "$before" = "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git ls-files)"
          else
            changed_files="$(git diff --name-only "$before" "${{ github.sha }}")"
          fi

          common_regex="^modi/(common|common-[^/]+)/|^modi/(build.gradle|settings.gradle|gradle.properties|gradlew|gradlew.bat|gradle/)|^\\.github/workflows/"
          build_all=false
          if echo "$changed_files" | grep -qE "$common_regex"; then
            build_all=true
          fi

          if [ "$build_all" = true ]; then
            changed="${services[*]}"
          else
            changed=""
            for service in "${services[@]}"; do
              if echo "$changed_files" | grep -qE "^modi/${service}/"; then
                changed="$changed $service"
              fi
            done
          fi

          changed="$(echo "$changed" | xargs || true)"
          echo "changed_services=$changed" >> "$GITHUB_OUTPUT"
          CHANGED="$changed" python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          items = os.environ.get("CHANGED", "").split()
          print("changed_services_json=" + json.dumps(items))
          PY

          if [ -z "$changed" ]; then
            echo "No service changes detected."
          else
            echo "Changed services: $changed"
          fi

  build-push:
    needs: detect
    if: needs.detect.outputs.changed_services_json != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect.outputs.changed_services_json) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17
          cache: gradle

      - name: Build service JAR
        working-directory: modi
        run: |
          chmod +x gradlew
          ./gradlew -x test :${{ matrix.service }}:build

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker Images
        uses: docker/build-push-action@v6
        with:
          context: ./modi/${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ env.TAG }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    needs: [detect, build-push]
    if: needs.detect.outputs.changed_services != ''
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 (k3s)
        uses: appleboy/ssh-action@v1
        env:
          CHANGED_SERVICES: ${{ needs.detect.outputs.changed_services }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "▶ Restarting deployments on k3s (sequential)"

            priority=(modi-config modi-discovery modi-gateway)

            for service in "${priority[@]}"; do
              if echo "$CHANGED_SERVICES" | grep -qw "$service"; then
                kubectl rollout restart deploy "$service"
                kubectl rollout status deploy "$service"
              fi
            done

            for service in $CHANGED_SERVICES; do
              if [[ ! " ${priority[*]} " =~ " ${service} " ]]; then
                kubectl rollout restart deploy "$service"
                kubectl rollout status deploy "$service"
              fi
            done

            echo "▶ Deploy finished"
