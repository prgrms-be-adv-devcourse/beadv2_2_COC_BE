name: Deploy dev (Docker to EC2)

on:
  push:
    branches:
      - test/dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. JDK 17
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17

      # 3. build services jar
      - name: Build all services JAR
        working-directory: modi
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      # 3. Docker build & save (서비스별)
      - name: Build & save docker images
        run: |
          services=("account-service" "product-service" "rental-service" "seller-service" "member-service" "review-service" "notification-service" "modi-config" "modi-gateway" "modi-discovery")
        
          for service in "${services[@]}"; do
            echo "Building $service ..."
            docker build -t $service:latest ./modi/$service
            docker save -o $service.tar $service:latest
            ls -al
          done

      # 4. Copy tar & compose to EC2
      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "*.tar,docker-compose.yml"
          target: /home/ec2-user/app/modi
          use_insecure_cipher: true

      #5. Run on EC2
      - name: Run containers on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app/modi
            
            docker compose down

            for tar in *.tar; do
              docker load -i $tar
            done

            docker compose up -d
