name: Deploy product-service (Docker)

on:
  push:
    branches:
      - test/product-db

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: corredo
          java-version: 17

      - name: Build JAR
        working-directory: modi
        run: |
          chmod +x gradlew
          ./gradlew :product-service:bootJar -x test

      - name: Build Docker image
        working-directory: modi/product-service
        run: |
          docker build -t product-service:latest .

      - name: Save Docker image
        run: |
          docker save product-service:latest > product-service.tar

      - name: Copy image & compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: |
            product-service.tar
            docker-compose.yml
          target: /home/ec2-user/app/modi

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app/modi
            docker load < product-service.tar
            docker compose up -d
