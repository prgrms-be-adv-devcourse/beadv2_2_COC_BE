name: Deploy dev

on:
  push:
    branches:
      - dev-cicd

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. JDK 17
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17

      # 3. build services jar
      - name: Build all services JAR
        working-directory: modi
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      # GHCR login
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

#          services=("account-service" "product-service" "rental-service" "seller-service" "member-service" "review-service" "notification-service" "modi-config" "modi-gateway" "modi-discovery")
      # 3. Docker build & save (서비스별)
      - name: Build & save docker images
        run: |
          services=("account-service" "product-service" "rental-service" "seller-service" "member-service" "modi-config" "modi-gateway" "modi-discovery")

          for service in "${services[@]}"; do
            IMAGE_NAME=$REGISTRY/$IMAGE_OWNER/$service:dev-cicd
            echo "Building $IMAGE_NAME ..."
            docker build -t $IMAGE_NAME ./modi/$service
            docker push $IMAGE_NAME
          done

      #5. deploy on EC2
      - name: deploy on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app/modi
            
            docker compose down
            docker compose pull
            docker compose up -d
            docker system prune -f
