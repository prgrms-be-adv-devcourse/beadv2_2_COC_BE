name: Deploy product-service to EC2

on:
  push:
    branches:
      - test/product-db

jobs:
  deploy:
    runs-on: ubuntu-latest


    defaults:
      run:
        working-directory: modi

    steps:
      # 1. 코드 체크아웃
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. JDK 17 (Amazon Corretto)
      - name: Set up JDK 17 (Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      # 3. Gradle 실행 권한 (루트 gradlew)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Build product-service (멀티모듈 방식)
      - name: Build product-service
        run: ./gradlew :product-service:bootJar -x test

      # 5. EC2로 JAR 파일 전송
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: modi/product-service/build/libs/*.jar
          target: ${{ secrets.EC2_PRODUCT_PATH }}

      # 6. EC2에서 애플리케이션 재시작
      - name: Restart product-service on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 product-service 재시작"
            
            cd /home/ec2-user/app/modi/product-service
            
            chmod +x start.sh || true
            ./start.sh
            
            echo "🔍 프로세스 확인"
            ps -ef | grep product-service | grep -v grep || echo "프로세스 없음"
            
            echo "🔍 8082 포트 확인"
            lsof -i:8082 || echo "8082 아직 미열림"
            
            echo "✅ 배포 완료"