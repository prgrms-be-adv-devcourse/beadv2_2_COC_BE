name: Deploy product-service (Docker to EC2)

on:
  push:
    branches:
      - test/product-db

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. JDK 17
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17

      # 3. Build product-service JAR
      - name: Build product-service
        working-directory: modi
        run: |
          chmod +x gradlew
          ./gradlew :product-service:bootJar -x test

      # 4. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t product-service:latest ./modi/product-service

      # 5. Save image to tar
      - name: Save Docker image
        run: |
          docker save product-service:latest > ./modi/product-service.tar
          ls -al

      # 6. Copy tar & compose to EC2
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: |
            /modi/product-service.tar
            docker-compose.yml
          target: /home/ec2-user/app/modi

      # 7. Run on EC2
      - name: Run containers on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app/modi
            
            mkdir -p images
            mv product-service.tar images/

            docker load < images/product-service.tar
            docker compose down
            docker compose up -d
