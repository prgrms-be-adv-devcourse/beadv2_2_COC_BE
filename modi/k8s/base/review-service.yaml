apiVersion: v1
kind: Service
metadata:
  name: review-service
  labels:
    app: review-service
spec:
  ports:
    - name: http
      port: 8086
      targetPort: 8086
  selector:
    app: review-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
  labels:
    app: review-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-service
  template:
    metadata:
      labels:
        app: review-service
    spec:
      containers:
        - name: review-service
          image: modi/review-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8086
          env:
            - name: SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED
              value: "false"
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
            - name: SERVER_PORT
              value: "8086"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: modi-env
                  key: REVIEW_DB_URL
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
          envFrom:
            - secretRef:
                name: modi-env
          startupProbe:
            tcpSocket:
              port: 8086
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 10
