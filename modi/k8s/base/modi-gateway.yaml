apiVersion: v1
kind: Service
metadata:
  name: modi-gateway
  labels:
    app: modi-gateway
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: modi-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modi-gateway
  labels:
    app: modi-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modi-gateway
  template:
    metadata:
      labels:
        app: modi-gateway
    spec:
      containers:
        - name: modi-gateway
          image: modi/modi-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED
              value: "false"
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: modi-env
                  key: DB_URL
          envFrom:
            - secretRef:
                name: modi-env
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10