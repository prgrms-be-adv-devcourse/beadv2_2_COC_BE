apiVersion: batch/v1
kind: CronJob
metadata:
  name: seller-settlement-monthly
  labels:
    app: seller-service
spec:
  schedule: "5 0 1 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: settlement-trigger
              image: curlimages/curl:8.5.0
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  curl -sS -X POST "http://seller-service:8084/internal/settlements/batches/monthly/run"
