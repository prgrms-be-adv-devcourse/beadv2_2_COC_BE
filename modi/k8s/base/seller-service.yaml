apiVersion: v1
kind: Service
metadata:
  name: seller-service
  labels:
    app: seller-service
spec:
  ports:
    - name: http
      port: 8084
      targetPort: 8084
  selector:
    app: seller-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seller-service
  labels:
    app: seller-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seller-service
  template:
    metadata:
      labels:
        app: seller-service
    spec:
      containers:
        - name: seller-service
          image: modi/seller-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8084
          env:
            - name: SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED
              value: "false"
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
            - name: SERVER_PORT
              value: "8084"
          envFrom:
            - secretRef:
                name: modi-env
          readinessProbe:
            tcpSocket:
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 10
