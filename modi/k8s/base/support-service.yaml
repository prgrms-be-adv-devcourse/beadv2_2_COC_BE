apiVersion: v1
kind: Service
metadata:
  name: support-service
  labels:
    app: support-service
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: support-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: support-service
  labels:
    app: support-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: support-service
  template:
    metadata:
      labels:
        app: support-service
    spec:
      containers:
        - name: support-service
          image: modi/support-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED
              value: "false"
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: modi-env
                  key: SUPPORT_DB_URL
          envFrom:
            - secretRef:
                name: modi-env
          startupProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
