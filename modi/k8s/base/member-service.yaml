apiVersion: v1
kind: Service
metadata:
  name: member-service
  labels:
    app: member-service
spec:
  ports:
    - name: http
      port: 8085
      targetPort: 8085
  selector:
    app: member-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: member-service
  labels:
    app: member-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: member-service
  template:
    metadata:
      labels:
        app: member-service
    spec:
      containers:
        - name: member-service
          image: modi/member-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8085
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms128m -Xmx256m -XX:MaxMetaspaceSize=256m"
            - name: SPRING_CLOUD_CONFIG_DISCOVERY_ENABLED
              value: "false"
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
            - name: SERVER_PORT
              value: "8085"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: modi-env
                  key: MEMBER_DB_URL
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
          envFrom:
            - secretRef:
                name: modi-env
          resources:
            requests:
              memory: "200Mi"
            limits:
              memory: "768Mi"
          startupProbe:
            tcpSocket:
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 10
