server:
  port: 8888

spring:
  application:
    name: modi-config
  cloud:
    config:
      server:
        overrides:
          spring.datasource.username: ${DB_USER}
          spring.datasource.password: ${DB_PASSWORD}
          toss.payments.client-key: ${TOSS_CLIENT_KEY}
          toss.payments.secret-key: ${TOSS_SECRET_KEY}
          toss.api-url: ${TOSS_API_URL}
          toss.success-url: ${TOSS_SUCCESS_URL}
          toss.fail-url: ${TOSS_FAIL_URL}
          jwt.secret: ${JWT_SECRET}
          auth.oauth2.enabled: false
          auth.oauth2.success-redirect: https://coc-modi.vercel.app
          auth.oauth2.failure-redirect: https://coc-modi.vercel.app/intro
          auth.oauth2.link-required-redirect: https://coc-modi.vercel.app/intro
          spring.security.oauth2.client.registration.google.client-id: ${OAUTH2_GOOGLE_CLIENT_ID:}
          spring.security.oauth2.client.registration.google.client-secret: ${OAUTH2_GOOGLE_CLIENT_SECRET:}
          spring.security.oauth2.client.registration.google.scope: profile,email
          spring.security.oauth2.client.registration.kakao.client-id: ${OAUTH2_KAKAO_CLIENT_ID:}
          spring.security.oauth2.client.registration.kakao.client-authentication-method: none
          spring.security.oauth2.client.registration.kakao.authorization-grant-type: authorization_code
          spring.security.oauth2.client.registration.kakao.scope: profile,nickname
          spring.security.oauth2.client.provider.kakao.authorization-uri: https://kauth.kakao.com/oauth/authorize
          spring.security.oauth2.client.provider.kakao.token-uri: https://kauth.kakao.com/oauth/token
          spring.security.oauth2.client.provider.kakao.user-info-uri: https://kapi.kakao.com/v2/user/me
          spring.security.oauth2.client.provider.kakao.user-name-attribute: id
          spring.security.oauth2.client.registration.naver.client-id: ${OAUTH2_NAVER_CLIENT_ID:}
          spring.security.oauth2.client.registration.naver.client-secret: ${OAUTH2_NAVER_CLIENT_SECRET:}
          spring.security.oauth2.client.registration.naver.client-authentication-method: client_secret_post
          spring.security.oauth2.client.registration.naver.authorization-grant-type: authorization_code
          spring.security.oauth2.client.registration.naver.scope: profile,nickname
          spring.security.oauth2.client.provider.naver.authorization-uri: https://nid.naver.com/oauth2.0/authorize
          spring.security.oauth2.client.provider.naver.token-uri: https://nid.naver.com/oauth2.0/token
          spring.security.oauth2.client.provider.naver.user-info-uri: https://openapi.naver.com/v1/nid/me
          spring.security.oauth2.client.provider.naver.user-name-attribute: response
          spring.mail.username: ${EMAIL_ADDRESS}
          spring.mail.password: ${EMAIL_PASSWORD}
          spring.data.redis.host: ${REDIS_HOST}
          spring.data.redis.port: ${REDIS_PORT}
          internal.api.token: ${INTERNAL_API_TOKEN:}
          mail.from-address: ${EMAIL_ADDRESS}
          product-service.url: ${PRODUCT_SERVICE_URL}
          account-service.url: ${ACCOUNT_SERVICE_URL}
          rental-service.url: ${RENTAL_SERVICE_URL}
          rental-service.base-url: ${RENTAL_SERVICE_URL}
          member-service.url: ${MEMBER_SERVICE_URL}
          seller-service.url: ${SELLER_SERVICE_URL}
          eureka.client.service-url.defaultZone: ${EUREKA_URI}
          spring.elasticsearch.uris: ${ELASTIC_URL}
          cloud.aws.s3.bucket: ${S3_BUCKET_NAME}
          cloud.aws.region.static: ${S3_REGION}
          cloud.aws.credentials.accessKey: ${S3_ACCESS_KEY}
          cloud.aws.credentials.secretKey: ${S3_SECRET_KEY}
          resilience4j.retry.instances.settlementPayoutRetry.max-attempts: 3
          resilience4j.retry.instances.settlementPayoutRetry.wait-duration: 500ms
          resilience4j.circuitbreaker.instances.settlementPayoutCircuitBreaker.sliding-window-type: COUNT_BASED
          resilience4j.circuitbreaker.instances.settlementPayoutCircuitBreaker.sliding-window-size: 10
          resilience4j.circuitbreaker.instances.settlementPayoutCircuitBreaker.minimum-number-of-calls: 5
          resilience4j.circuitbreaker.instances.settlementPayoutCircuitBreaker.failure-rate-threshold: 50
          resilience4j.circuitbreaker.instances.settlementPayoutCircuitBreaker.wait-duration-in-open-state: 10s
          resilience4j.circuitbreaker.instances.settlementPayoutCircuitBreaker.permitted-number-of-calls-in-half-open-state: 3
          resilience4j.circuitbreaker.instances.settlementPayoutCircuitBreaker.automatic-transition-from-open-to-half-open-enabled: true
          openai.api-key: ${OPENAI_API_KEY}
          openai.base-url: https://api.openai.com/
          openai.chat.options.model: gpt-5-nano
          openai.chat.options.temperature: 1.0
          openai.chat.max-tokens: 256
          openai.chat.template.system: |
            너는 전자기기 렌탈 서비스의 상담 도우미야.
            전문용어는 쉬운 표현으로 설명하고, 핵심 정보만 간결하게 답변해.
            답변은 2문장 이내로, 핵심만 요약해. 불필요한 서론/부연 설명은 생략해.
            확실하지 않은 정보는 추측하지 말고, 필요한 경우에만 아주 짧게 세부사항을 질문해.
          openai.embeddings.model: text-embedding-3-small
          openai.embeddings.dimensions: 1536
        git:
          uri: ${GIT_URI}
          username: ${GIT_USER}
          password: ${GIT_PAT}
          refresh-rate: 0 # every request checks for updates
          force-pull: true # discard local changes and pull from remote when refreshing
        default-label: main


eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI}

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
  endpoint:
    health:
      show-details: always
