global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "modi-local"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          # Docker 컨테이너 -> 호스트 JVM 접근
          #----------로컬용------------------------
#          - "host.docker.internal:8000"  # gateway (webflux)
#
#          - "host.docker.internal:8085"  # member-service (mvc)
#          - "host.docker.internal:8081"  # account-service
#          - "host.docker.internal:8082"  # product-service
#          - "host.docker.internal:8083"  # rental-service
#          - "host.docker.internal:8084"  # seller-service
         #------------EC2용----------------------
          - "modi-gateway:8080"      # gateway
          - "member-service:8080"    # member
          - "account-service:8080"   # account
          - "product-service:8080"   # product
          - "rental-service:8080"    # rental
          - "seller-service:8080"    # seller